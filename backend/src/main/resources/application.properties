# ══ ThreadScope Live — Server Configuration ══════════════════════

# Allow Render/Docker to set the port via the PORT env var (default 8080)
server.port=${PORT:8080}

# WebSocket buffer size — configured programmatically in WebSocketConfig.java
# via ServletServerContainerFactoryBean (spring.websocket.* keys are INVALID
# in Spring Boot and are silently ignored — see BUG-03 fix).

# Logging
logging.level.com.threadscope=INFO
logging.level.org.springframework.web.socket=WARN
logging.level.org.springframework=WARN
logging.pattern.console=%d{HH:mm:ss} [%-5level] %msg%n

# Jackson — exclude null fields from JSON to reduce payload size
spring.jackson.serialization.indent-output=false
spring.jackson.default-property-inclusion=non_null

# Spring Boot startup banner
spring.main.banner-mode=off

# Scheduler — dedicated thread pool for @Scheduled tasks
# Prevents slow broadcasts from blocking other scheduled work
spring.task.scheduling.pool.size=2

# Actuator — health endpoint only, restricted to localhost
management.server.address=127.0.0.1
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
